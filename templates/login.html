<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - 塾配布シフト</title>
    <style>
        /* 画面の真ん中にログインボックスを配置するCSS */
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 300px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px;}
        .error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 10px; text-align: center;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align: center; margin-top: 0;">ログイン</h2>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="ユーザーID (例: hiro)" required>
            <input type="password" name="password" placeholder="パスワード (例: 1234)" required>
            <button type="submit">ログインする</button>
        </form>
    </div>
</body>
</html>
