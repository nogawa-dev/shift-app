<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; margin: 0; }
        .reset-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        button:hover { background: #c82333; }
        .error { color: #dc3545; font-size: 14px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .success { color: #28a745; font-size: 14px; margin-bottom: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2 style="text-align: center; margin-top: 0;">🔑 パスワード再設定</h2>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% elif success %}
            <div class="success">{{ success }}</div>
            <a href="/login" style="display: block; text-align: center; margin-top: 20px; text-decoration: none; color: white; background: #007bff; padding: 10px; border-radius: 4px; font-weight: bold;">ログイン画面へ戻る</a>
        {% endif %}

        {% if not success %}
        <p style="font-size: 13px; color: #555; line-height: 1.5;">
            本人確認のため、登録している「ログインID」と「カレンダー表示名（名字）」を入力してください。
        </p>
        
        <form method="POST">
            <input type="text" name="username" placeholder="ログインID" required>
            <input type="text" name="last_name" placeholder="カレンダー表示名（例：田中）" required>
            <input type="password" name="new_password" placeholder="新しいパスワード" required>
            <button type="submit">パスワードをリセット</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px;">
            <a href="/login" style="color: #007bff; text-decoration: none;">← ログイン画面に戻る</a>
        </p>
        {% endif %}
    </div>
</body>
</html>
